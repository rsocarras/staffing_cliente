name: Test AWS OIDC

on:
  push:
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  test-aws:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::737923405902:role/github-oidc-role
          aws-region: us-east-1

      - name: Deploy on EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --targets "Key=tag:git-deploy-target,Values=dev-staffing-full" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo -u ubuntu -H bash -lc \"/home/ubuntu/pull_cliente.sh\""]' \
            --query "Command.CommandId" \
            --output text \
            --region us-east-1)
      
          echo "Command ID: $COMMAND_ID"
      
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:git-deploy-target,Values=dev-staffing-full" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
      
          while true; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE_ID \
              --query "Status" \
              --output text)
      
            aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id $INSTANCE_ID \
              --query "StandardOutputContent" \
              --output text || true
      
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" ]]; then
              echo "Command finished with status: $STATUS"
              exit 0
            fi
      
            sleep 5
          done
