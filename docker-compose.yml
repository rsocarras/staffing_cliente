services:
  # Backend
  app:
    build: .
    container_name: yii2_backend
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - DB_DSN=mysql:host=db_shared_staffing;dbname=hr_staffing
      - DB_USER=root
      - DB_PASS=root
    networks:
      - shared-network-staffing

networks:
  shared-network-staffing:
    external: true